name: aitota_business
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+20

environment:
  sdk: ">=3.5.0 <4.0.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.6.0
  flutter_screenutil: ^5.9.3
  firebase_core: ^3.15.2
  intl: ^0.20.2
  permission_handler: ^12.0.1
  url_launcher: ^6.3.1
  get_storage: ^2.1.1
  flutter_contacts: ^1.1.9+2
  cached_network_image: ^3.4.1
  file_picker: ^10.2.0
  excel: ^4.0.6
  csv: ^6.0.0
  flutter_animate: ^4.5.2
  flutter_launcher_icons: ^0.14.4
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  shimmer: ^3.0.0
  animations: ^2.0.11
  table_calendar: ^3.2.0
  audioplayers: ^6.5.1
  flutter_spinkit: ^5.2.1
  flutter_tts: ^4.2.3
  path_provider: ^2.1.5
  web_socket_channel: ^3.0.3
  flutter_phone_direct_caller: ^2.2.1
  share_plus: ^11.1.0
  speech_to_text: ^7.2.0
  flutter_cashfree_pg_sdk: ^2.0.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  call_log: ^6.0.1
  flutter_svg: ^2.2.3
  get: ^4.7.3
  # google_sign_in: ^7.2.0
  audio_session: ^0.2.2
  device_info_plus: ^12.3.0
  mobile_scanner: ^7.2.0
  google_sign_in: ^6.2.1
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:


  uses-material-design: true

  assets:
    - assets/images/
    - assets/gif/

  fonts:
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 800
        - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Medium.ttf
          weight: 600
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
          weight: 500

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 600

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/aitota__logo.png" # fallback for iOS
  adaptive_icon_foreground: "assets/images/aitota__logo.png"
